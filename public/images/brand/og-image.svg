<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#d4a017" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#d4a017" stroke-width="0.5" opacity="0.2"/>
  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.4"/>
  <!-- Main brand name -->
  <text x="600" y="290" font-family="Georgia, serif" font-size="120" font-weight="bold" fill="#d4a017" text-anchor="middle" letter-spacing="24">PEDALS</text>
  <!-- Tagline -->
  <text x="600" y="370" font-family="Georgia, serif" font-size="28" fill="#f5f0e8" text-anchor="middle" letter-spacing="8" opacity="0.85">HANDCRAFTED BOUTIQUE GUITAR PEDALS</text>
  <!-- Subtagline KR -->
  <text x="600" y="420" font-family="Georgia, serif" font-size="20" fill="#f5f0e8" text-anchor="middle" letter-spacing="4" opacity="0.5">서울에서 손으로 만든 부띠끄 기타 이펙터</text>
  <!-- Decorative dots -->
  <circle cx="200" cy="315" r="4" fill="#d4a017" opacity="0.5"/>
  <circle cx="1000" cy="315" r="4" fill="#d4a017" opacity="0.5"/>
</svg>
