<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#1a1a1a"/>
  <!-- Pedal body - wider variant -->
  <rect x="145" y="120" width="310" height="360" rx="20" ry="20" fill="#1f1f1f" stroke="#d4a017" stroke-width="3"/>
  <!-- Corner screws -->
  <circle cx="174" cy="149" r="8" fill="#2b2b2b" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="426" cy="149" r="8" fill="#2b2b2b" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="174" cy="451" r="8" fill="#2b2b2b" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="426" cy="451" r="8" fill="#2b2b2b" stroke="#d4a017" stroke-width="1.5"/>
  <!-- Spring coil accent -->
  <path d="M195 185 Q215 165 235 185 Q255 205 275 185 Q295 165 315 185 Q335 205 355 185 Q375 165 395 185" fill="none" stroke="#d4a017" stroke-width="3" stroke-linecap="round"/>
  <path d="M195 205 Q215 185 235 205 Q255 225 275 205 Q295 185 315 205 Q335 225 355 205 Q375 185 395 205" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M195 220 Q215 200 235 220 Q255 240 275 220 Q295 200 315 220 Q335 240 355 220 Q375 200 395 220" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- 3 knobs -->
  <circle cx="215" cy="310" r="30" fill="#262626" stroke="#d4a017" stroke-width="2"/>
  <circle cx="300" cy="310" r="30" fill="#262626" stroke="#d4a017" stroke-width="2"/>
  <circle cx="385" cy="310" r="30" fill="#262626" stroke="#d4a017" stroke-width="2"/>
  <!-- Knob indicators -->
  <line x1="215" y1="283" x2="215" y2="297" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="283" x2="300" y2="297" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="385" y1="283" x2="385" y2="297" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Footswitch -->
  <circle cx="300" cy="408" r="36" fill="#111" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="300" cy="408" r="23" fill="#1c1c1c" stroke="#555" stroke-width="1"/>
  <!-- LED -->
  <circle cx="300" cy="252" r="6" fill="#d4a017" opacity="0.9"/>
  <!-- Label -->
  <text x="300" y="466" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#f5f0e8" text-anchor="middle" letter-spacing="3">SPRING TANK</text>
  <!-- Side jacks -->
  <rect x="145" y="278" width="13" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
  <rect x="442" y="278" width="13" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
</svg>
