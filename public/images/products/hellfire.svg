<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#1a1a1a"/>
  <!-- Pedal body -->
  <rect x="160" y="120" width="280" height="360" rx="18" ry="18" fill="#222" stroke="#d4a017" stroke-width="3"/>
  <!-- Top screws -->
  <circle cx="185" cy="145" r="8" fill="#333" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="415" cy="145" r="8" fill="#333" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="185" cy="455" r="8" fill="#333" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="415" cy="455" r="8" fill="#333" stroke="#d4a017" stroke-width="1.5"/>
  <!-- Flame accent -->
  <path d="M270 170 Q290 140 300 160 Q310 140 330 170 Q340 200 300 220 Q260 200 270 170Z" fill="#d4a017" opacity="0.9"/>
  <!-- Knobs row -->
  <circle cx="210" cy="290" r="28" fill="#2a2a2a" stroke="#d4a017" stroke-width="2"/>
  <circle cx="300" cy="290" r="28" fill="#2a2a2a" stroke="#d4a017" stroke-width="2"/>
  <circle cx="390" cy="290" r="28" fill="#2a2a2a" stroke="#d4a017" stroke-width="2"/>
  <!-- Knob indicators -->
  <line x1="210" y1="265" x2="210" y2="278" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="265" x2="300" y2="278" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="265" x2="390" y2="278" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Footswitch -->
  <circle cx="300" cy="400" r="36" fill="#111" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="300" cy="400" r="24" fill="#1e1e1e" stroke="#555" stroke-width="1"/>
  <!-- LED -->
  <circle cx="300" cy="235" r="6" fill="#d4a017" opacity="0.95"/>
  <!-- Label -->
  <text x="300" y="470" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f5f0e8" text-anchor="middle" letter-spacing="4">HELLFIRE</text>
  <!-- Input/Output jacks suggestion -->
  <rect x="160" y="270" width="14" height="28" rx="4" fill="#333" stroke="#d4a017" stroke-width="1"/>
  <rect x="426" y="270" width="14" height="28" rx="4" fill="#333" stroke="#d4a017" stroke-width="1"/>
</svg>
