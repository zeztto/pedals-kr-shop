<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#1a1a1a"/>
  <!-- Pedal body - tallest variant -->
  <rect x="150" y="105" width="300" height="390" rx="18" ry="18" fill="#212121" stroke="#d4a017" stroke-width="3"/>
  <!-- Corner screws -->
  <circle cx="178" cy="133" r="8" fill="#2d2d2d" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="422" cy="133" r="8" fill="#2d2d2d" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="178" cy="465" r="8" fill="#2d2d2d" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="422" cy="465" r="8" fill="#2d2d2d" stroke="#d4a017" stroke-width="1.5"/>
  <!-- Tape reel accent - left reel -->
  <circle cx="248" cy="195" r="38" fill="none" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="248" cy="195" r="14" fill="#d4a017" opacity="0.7"/>
  <line x1="248" y1="160" x2="248" y2="181" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="248" y1="209" x2="248" y2="230" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="213" y1="195" x2="234" y2="195" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="262" y1="195" x2="283" y2="195" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Tape reel accent - right reel -->
  <circle cx="352" cy="195" r="38" fill="none" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="352" cy="195" r="14" fill="#d4a017" opacity="0.7"/>
  <line x1="352" y1="160" x2="352" y2="181" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="352" y1="209" x2="352" y2="230" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="317" y1="195" x2="338" y2="195" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="366" y1="195" x2="387" y2="195" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Tape path between reels -->
  <path d="M286 185 Q300 178 314 185" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.6"/>
  <path d="M286 205 Q300 212 314 205" fill="none" stroke="#d4a017" stroke-width="2" opacity="0.6"/>
  <!-- 4 knobs -->
  <circle cx="195" cy="318" r="26" fill="#272727" stroke="#d4a017" stroke-width="2"/>
  <circle cx="265" cy="318" r="26" fill="#272727" stroke="#d4a017" stroke-width="2"/>
  <circle cx="335" cy="318" r="26" fill="#272727" stroke="#d4a017" stroke-width="2"/>
  <circle cx="405" cy="318" r="26" fill="#272727" stroke="#d4a017" stroke-width="2"/>
  <!-- Knob indicators -->
  <line x1="195" y1="295" x2="195" y2="307" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="265" y1="295" x2="265" y2="307" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="335" y1="295" x2="335" y2="307" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="405" y1="295" x2="405" y2="307" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Footswitch -->
  <circle cx="300" cy="415" r="36" fill="#111" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="300" cy="415" r="23" fill="#1c1c1c" stroke="#555" stroke-width="1"/>
  <!-- LED -->
  <circle cx="300" cy="260" r="6" fill="#d4a017" opacity="0.9"/>
  <!-- Label -->
  <text x="300" y="472" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#f5f0e8" text-anchor="middle" letter-spacing="3">TAPE ECHO</text>
  <!-- Side jacks -->
  <rect x="150" y="285" width="13" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
  <rect x="437" y="285" width="13" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
</svg>
