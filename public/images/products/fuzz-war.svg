<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#1a1a1a"/>
  <!-- Pedal body - slightly rounder -->
  <rect x="170" y="130" width="260" height="340" rx="30" ry="30" fill="#1e1e1e" stroke="#d4a017" stroke-width="3"/>
  <!-- Corner screws -->
  <circle cx="198" cy="158" r="7" fill="#2a2a2a" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="402" cy="158" r="7" fill="#2a2a2a" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="198" cy="442" r="7" fill="#2a2a2a" stroke="#d4a017" stroke-width="1.5"/>
  <circle cx="402" cy="442" r="7" fill="#2a2a2a" stroke="#d4a017" stroke-width="1.5"/>
  <!-- Lightning bolt accent -->
  <path d="M315 165 L285 230 L305 230 L275 295 L335 215 L312 215 Z" fill="#d4a017" opacity="0.9"/>
  <!-- 2 knobs -->
  <circle cx="255" cy="310" r="32" fill="#252525" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="345" cy="310" r="32" fill="#252525" stroke="#d4a017" stroke-width="2.5"/>
  <!-- Knob indicators -->
  <line x1="255" y1="281" x2="255" y2="295" stroke="#d4a017" stroke-width="3" stroke-linecap="round"/>
  <line x1="345" y1="281" x2="345" y2="295" stroke="#d4a017" stroke-width="3" stroke-linecap="round"/>
  <!-- Footswitch -->
  <circle cx="300" cy="405" r="34" fill="#111" stroke="#d4a017" stroke-width="2.5"/>
  <circle cx="300" cy="405" r="22" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <!-- LED -->
  <circle cx="300" cy="250" r="6" fill="#d4a017" opacity="0.9"/>
  <!-- Label -->
  <text x="300" y="462" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#f5f0e8" text-anchor="middle" letter-spacing="3">FUZZ WAR</text>
  <!-- Side jacks -->
  <rect x="170" y="278" width="12" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
  <rect x="418" y="278" width="12" height="26" rx="4" fill="#2a2a2a" stroke="#d4a017" stroke-width="1"/>
</svg>
